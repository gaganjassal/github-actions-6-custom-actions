name: Deployment
on:
  push:
    branches:
      - main
jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Get code
        uses: actions/checkout@v6.0.2
      - name: Load & Cache Dependencies using Custom Action
        id: cache-deps
        uses: ./.github/myactions/cached-deps
        with: 
          caching: 'false'
      - name: Output information
        run: |
          echo "Cache used: ${{ steps.cache-deps.outputs.used-cache }}"
      - name: Lint code
        run: npm run lint
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Get code
        uses: actions/checkout@v6.0.2

      # Local custom action
      # - name: Load & Cache Dependencies using Custom Action
      #   uses: ./.github/myactions/cached-deps

      # Remote custom action from my GitHub 
      - name: Load & Cache Dependencies using Custom Action from my GitHub repo
        uses: gaganjassal/gha-my-custom-action-cache-dependency@v1
      
      - name: Test code
        id: run-tests
        run: npm run test
      - name: Upload test report
        if: failure() && steps.run-tests.outcome == 'failure'
        uses: actions/upload-artifact@v6
        with:
          name: test-report
          path: test.json
  build:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - name: Get code
        uses: actions/checkout@v6.0.2

      # Local custom action
      # - name: Load & Cache Dependencies using Custom Action
      #   uses: ./.github/myactions/cached-deps

      # Remote custom action from my GitHub 
      - name: Load & Cache Dependencies using Custom Action from my GitHub repo
        uses: gaganjassal/gha-my-custom-action-cache-dependency@v1

      - name: Build website
        run: npm run build
      - name: Upload artifacts
        uses: actions/upload-artifact@v6
        with:
          name: dist-files
          path: dist
  deploy:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Get code
        uses: actions/checkout@v6.0.2
      - name: Get build artifacts
        uses: actions/download-artifact@v6
        with:
          name: dist-files
          path: ./dist
